          - url: https://core.helloretail.com/serve/pages/673616e3bb6f1c28c79af9cc
            name: Find products by Hierarchies through params.filters [No filters or
              sorting]
            meta:
              id: req_ad7170a176124509a96a5eee1561b7ba
              created: 1731336495047
              modified: 1782220107689
              isPrivate: false
              description: >-
                Find products by their Hierarchies structure through the
                params.filters property definition in the request body.


                In this example, we are finding products from the "accessories"
                hierarchy.


                In this example, no filtering or sorting options are applied in
                the products object, which is the part of the request body where
                the customer/visiter selected filters and sorting should be
                added.
              sortKey: -1724318266847
            method: POST
            body:
              mimeType: application/json
              text: |-
                {
                  "url": "https://www.test.dk/category-path",
                  "format": "json",
                  "firstLoad": false,
                  "trackingUserId": "",
                	"deviceType":"DESKTOP",
                  "params": {
                    "filters": {
                      "hierarchies": ["accessories"]
                    }
                  },
                  "products": {
                    "start": 0,
                    "count": 20,
                    "fields": [
                      "productNumber",
                			"title",
                			"hierarchies",
                			"trackingCode"
                    ],
                    "filters": [],
                    "sorting": []
                  }
                }
            headers:
              - name: Content-Type
                value: application/json
            scripts:
              preRequest: ""
              afterResponse: ""
            settings:
              renderRequestBody: true
              encodeUrl: true
              followRedirects: global
              cookies:
                send: true
                store: true
              rebuildPath: true
