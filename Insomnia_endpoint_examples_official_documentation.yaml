          - url: https://core.helloretail.com/serve/pages/673616e3bb6f1c28c79af9cc
            name: Find products by all of supplied extraDataList values through
              params.filters [No filters or sorting]
            meta:
              id: req_6963a5f4f76e4e90a4ce46df13b31157
              created: 1731336495056
              modified: 1782220780019
              isPrivate: false
              description: >-
                Find products by their extraDataList array through the
                params.filters property definitions in the request body. All of
                the supplied extraDataList values in the params.filters must
                exist on a product for it to be returned.


                The $and key of the params.filters.$and is what enforces that
                only products which contain all of the supplied extraDataList's
                will be returned


                In this example, we are finding products from the "tags"
                extraDataList array.


                All 3 entries of the $and object is of the "tags" array, but it
                could also be a combination of different extraDataList arrays.


                In this example, no filtering or sorting options are applied in
                the products object, which is the part of the request body where
                the customer/visiter selected filters and sorting should be
                added.
              sortKey: -1724114606951.8438
            method: POST
            body:
              mimeType: application/json
              text: |-
                {
                    "url": "https://www.test.dk/category-path",
                    "format": "json",
                    "firstLoad": false,
                    "trackingUserId": "",
                		"deviceType":"DESKTOP",
                    "params": {
                        "filters": {
                					"$and":[
                						{"extraDataList.tags": "Accessory"},
                						{"extraDataList.tags": "Sport"},
                						{"extraDataList.tags": "Winter"}
                					]
                        }
                    },
                    "products": {
                        "start": 0,
                        "count": 20,
                        "fields": [
                            "title","originalUrl","extraDataList.tags"
                        ],
                        "filters": [],
                        "sorting": []
                    }
                }
            headers:
              - name: Content-Type
                value: application/json
            scripts:
              preRequest: ""
              afterResponse: ""
            settings:
              renderRequestBody: true
              encodeUrl: true
              followRedirects: global
              cookies:
                send: true
                store: true
              rebuildPath: true
