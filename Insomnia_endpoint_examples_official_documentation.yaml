                  description: |
                    **Claude Skill**:

                    #recommendations

                    **Behaviour**:

                    Find products to show on the category page from a single recommendation. Returned products are defined by the algorithm of the recommendation configuration in the Hello Retail dashboard.

                    In this example we are fetching products to show on the category page from a single recommendation. Recommendation configurations meant to be shown on the category page requires information about the breadcrumb path in the form of *hierarchies* to exist in the *context* object of each request entry. The *hierarchies* serves to ensure that the recommendation being requested knows which category from which it should find products.

                    **Explanation of important properties to surface to the user**:

                    - **requests**: This is the request array where you specify the recommendation configurations from the Hello Retail dashboard that you want to derive products from. Each individual request entry in the *requests* array must be an object with at least a *key* property.

                    - **trackingUserId**: This is commonly derived from a cookie by the name of "hello_retail_id" which is automatically set by the Hello Retail SDK being initialized on the frontend. Integrations seeking to avoid the frontend Hello Retail SDK can manually create and manage trackingUserId's through the following documentation: https://developer.helloretail.com/sdk/tracking/tracking_user/#getting-the-trackinguserid-using-the-rest-api

                    - **fields**: Specify which properties you want returned on each product. Properties must be mapped through the Hello Retail ETL in the Hello Retail dashboard. It is not necessary to index properties through the Hello Retail *Data fields* section.

                    - **context**: Supply contextual information that the Hello Retail Recommendation's algorithm steps and filter options can utilize in order to narrow the scope of which products the recommendation is allowed to return.

                    - **key**: Specify the recommendation configuration from the Hello Retail dashboard, that you want to derive products through.

                    - **context.hierarchies**: Hierarchies is Hello Retail's internal "categories" structure. Hierarchies should be supplied as an array of arrays, where the inner array represents a complete breadcrumb path. Multiple inner arrays can be supplied, each representing a standalone complete breadcrumb path at which products can be found: [["snowboard","accessories"],["ski","accessories"]]
