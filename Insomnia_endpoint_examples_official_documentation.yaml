                    Find products to show on the front page from a single recommendation. Returned products are defined by the algorithm of the recommendation configuration in the Hello Retail dashboard.

                    In this example we are fetching products to show on the front page from a single recommendation. Recommendation configurations meant to be shown on the front page typically require no data forwarded as part of the *context* object, because the typical front page recommendation configuration does not need to show products that relate to certain product (such as a product page recommendation), or adhere to a specific category id (such as a category page recommendation).

                    **Explanation of important properties to surface to the user**:

                    - **requests**: This is the request array where you specify the recommendation configurations from the Hello Retail dashboard that you want to derive products from. Each individual request entry in the *requests* array must be an object with at least a *key* property.

