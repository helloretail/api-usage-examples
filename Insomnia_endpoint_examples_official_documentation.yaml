            children:
              - url: https://core.helloretail.com/serve/pages/673616e3bb6f1c28c79af9cc
                name: Find products by Hierarchies through params.filters [No filters or
                  sorting]
                meta:
                  id: req_bb829d41956b48f3a35c1745cf0e9fe1
                  created: 1731336495047
                  modified: 1782307259546
                  isPrivate: false
                  description: |
                    **Claude Skill**:

                    #pages

                    **Behaviour**:

                    Find products by their Hierarchies structure through the params.filters property definition in the request body.

                    In this example, we are finding products from the "accessories" hierarchy.

                    In this example, no filtering or sorting options are applied in the products object, which is the part of the request body where the customer/visitor selected filters and sorting should be added.

                    **Explanation of important properties to surface to the user**:

                    - **trackingUserId**: This is commonly derived from a cookie by the name of "hello_retail_id" which is automatically set by the Hello Retail SDK being initialized on the frontend. Integrations seeking to avoid the frontend Hello Retail SDK can manually create and manage trackingUserId's through the following documentation: https://developer.helloretail.com/sdk/tracking/tracking_user/#getting-the-trackinguserid-using-the-rest-api

                    - **products.start & products.count**: These are used in conjunction to achieve the desired pagination.

                    - **url**: The url property serves the purpose of informing the Hello Retail Pages solution about which url you are currently displaying the Hello Retail Pages solution on. This is important for Hello Retail Pages to know because it is utilized to configure dynamic rules within the Hello Retail Pages dashboard based on which url the Hello Retail Pages solution is shown on.
                  sortKey: -1782294883147
                method: POST
                body:
                  mimeType: application/json
                  text: |-
                    {
                      "url": "https://www.test.dk/category-path",
                      "format": "json",
                      "firstLoad": true,
                      "trackingUserId": "",
                    	"deviceType":"DESKTOP",
                      "params": {
                        "filters": {
                          "hierarchies": ["accessories"]
                        }
                      },
                      "products": {
                        "start": 0,
                        "count": 20,
                        "fields": [
                          "productNumber",
                    			"title",
                    			"hierarchies",
                    			"trackingCode"
                        ],
                        "filters": [],
                        "sorting": []
                      }
                    }
                headers:
                  - name: Content-Type
                    value: application/json
                scripts:
                  preRequest: ""
                  afterResponse: ""
                settings:
                  renderRequestBody: true
                  encodeUrl: true
                  followRedirects: global
                  cookies:
                    send: true
                    store: true
                  rebuildPath: true
